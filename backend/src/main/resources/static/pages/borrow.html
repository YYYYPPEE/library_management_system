<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书借阅 - 图书馆管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="app">
        <!-- 导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="../index.html">图书馆管理系统</a>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto" id="navLinks">
                    </ul>
                </div>
            </div>
        </nav>

        <!-- 主内容 -->
        <div class="container mt-4">
            <h2 class="mb-4">图书借阅</h2>

            <!-- 选项卡 -->
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item">
                    <button class="nav-link active" id="tabAvailable" onclick="switchTab('available')">可借图书</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="tabMyRecords" onclick="switchTab('myRecords')">我的借阅</button>
                </li>
            </ul>

            <!-- 可借图书 -->
            <div id="availableBooks">
                <div class="row" id="availableBooksList"></div>
            </div>

            <!-- 我的借阅 -->
            <div id="myRecords" style="display: none;">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>图书ID</th>
                                <th>借阅时间</th>
                                <th>应还时间</th>
                                <th>归还时间</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordsList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
    <script>
        let currentTab = 'available';

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            initPage();
            loadAvailableBooks();
        });

        function initPage() {
            const userInfo = getUserInfo();
            const navLinks = document.getElementById('navLinks');

            if (userInfo) {
                const isAdmin = userInfo.role === 1;
                navLinks.innerHTML = `
                    <li class="nav-item">
                        <span class="nav-link text-white">欢迎, ${userInfo.realName}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="books.html">图书列表</a>
                    </li>
                    ${isAdmin ? `
                        <li class="nav-item">
                            <a class="nav-link" href="books.html">图书管理</a>
                        </li>
                    ` : ''}
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="handleLogout(event)">退出登录</a>
                    </li>
                `;
            } else {
                navLinks.innerHTML = `
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="books.html">图书列表</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">登录</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">注册</a>
                    </li>
                `;
            }
        }

        function handleLogout(event) {
            event.preventDefault();
            logout();
            alert('已退出登录');
            window.location.reload();
        }

        // 切换选项卡
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('availableBooks').style.display = tab === 'available' ? 'block' : 'none';
            document.getElementById('myRecords').style.display = tab === 'myRecords' ? 'block' : 'none';
            document.getElementById('tabAvailable').className = tab === 'available' ? 'nav-link active' : 'nav-link';
            document.getElementById('tabMyRecords').className = tab === 'myRecords' ? 'nav-link active' : 'nav-link';
            
            if (tab === 'available') {
                loadAvailableBooks();
            } else if (tab === 'myRecords') {
                loadMyRecords();
            }
        }

        // 加载可借图书
        async function loadAvailableBooks() {
            try {
                const res = await request('/borrow/available-books', { method: 'GET' });
                if (res.code === 200) {
                    renderAvailableBooks(res.data);
                } else {
                    alert(res.message);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 渲染可借图书
        function renderAvailableBooks(books) {
            const container = document.getElementById('availableBooksList');
            if (!books || books.length === 0) {
                container.innerHTML = '<div class="col-12"><p class="text-center">暂无可借图书</p></div>';
                return;
            }

            container.innerHTML = books.map(book => `
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(book.title)}</h5>
                            <h6 class="card-subtitle mb-2 text-muted">${escapeHtml(book.author)}</h6>
                            <p class="card-text">
                                <strong>ISBN:</strong> ${escapeHtml(book.isbn)}<br>
                                <strong>出版社:</strong> ${escapeHtml(book.publisher)}<br>
                                <strong>库存:</strong> ${book.availableStock}/${book.totalStock}<br>
                                <strong>价格:</strong> ¥${book.price}
                            </p>
                            <button class="btn btn-primary" onclick="borrowBook(${book.id})">借书</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 借书
        async function borrowBook(bookId) {
            const user = getUserInfo();
            if (!user) {
                alert('请先登录');
                window.location.href = 'login.html';
                return;
            }

            if (!confirm('确定要借阅这本书吗？')) {
                return;
            }

            try {
                const res = await request(`/borrow/borrow/${bookId}`, { method: 'POST' });
                if (res.code === 200) {
                    alert('借阅成功！');
                    loadAvailableBooks();
                } else {
                    alert(res.message);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 加载我的借阅记录
        async function loadMyRecords() {
            try {
                const res = await request('/borrow/my-records', { method: 'GET' });
                if (res.code === 200) {
                    renderMyRecords(res.data);
                } else {
                    alert(res.message);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 渲染我的借阅记录
        function renderMyRecords(records) {
            const tbody = document.getElementById('recordsList');
            if (!records || records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">暂无借阅记录</td></tr>';
                return;
            }

            tbody.innerHTML = records.map(record => `
                <tr>
                    <td>${record.id}</td>
                    <td>${record.bookId}</td>
                    <td>${new Date(record.borrowTime).toLocaleString()}</td>
                    <td>${new Date(record.dueTime).toLocaleString()}</td>
                    <td>${record.returnTime ? new Date(record.returnTime).toLocaleString() : '-'}</td>
                    <td>
                        <span class="badge ${getStatusBadgeClass(record.status)}">
                            ${getStatusText(record.status)}
                        </span>
                    </td>
                    <td>
                        ${record.status === 0 ? 
                            `<button class="btn btn-success btn-sm" onclick="returnBook(${record.id})">归还</button>` : 
                            '-'
                        }
                    </td>
                </tr>
            `).join('');
        }

        // 还书
        async function returnBook(recordId) {
            if (!confirm('确定要归还这本书吗？')) {
                return;
            }

            try {
                const res = await request(`/borrow/return/${recordId}`, { method: 'POST' });
                if (res.code === 200) {
                    alert('归还成功！');
                    loadMyRecords();
                } else {
                    alert(res.message);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 获取状态文字
        function getStatusText(status) {
            switch(status) {
                case 0: return '借阅中';
                case 1: return '已归还';
                case 2: return '已逾期';
                default: return '未知';
            }
        }

        // 获取状态样式
        function getStatusBadgeClass(status) {
            switch(status) {
                case 0: return 'bg-warning text-dark';
                case 1: return 'bg-success';
                case 2: return 'bg-danger';
                default: return 'bg-secondary';
            }
        }
    </script>
</body>
</html>
