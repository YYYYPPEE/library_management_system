<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="../index.html">图书管理系统</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navLinks">
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4 class="text-center">用户注册</h4>
                    </div>
                    <div class="card-body">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="mb-3">
                                <label for="realName" class="form-label">真实姓名</label>
                                <input type="text" class="form-control" id="realName" required>
                            </div>
                            <div class="mb-3">
                                <label for="studentNo" class="form-label">学号/工号</label>
                                <input type="text" class="form-control" id="studentNo">
                            </div>
                            <div class="mb-3">
                                <label for="role" class="form-label">角色</label>
                                <select class="form-select" id="role">
                                    <option value="0">学生</option>
                                    <option value="1">管理员</option>
                                </select>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">注册</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
    <script>
        function initPage() {
            const navLinks = document.getElementById('navLinks');
            const currentTheme = localStorage.getItem('theme') || 'light';
            const themeIcon = currentTheme === 'light' ? '🌙' : '☀️';
            
            navLinks.innerHTML = `
                <li class="nav-item">
                    <button id="themeSwitchBtn" class="theme-switch-btn" onclick="toggleTheme()" title="切换到${currentTheme === 'light' ? '夜间' : '日间'}模式">${themeIcon}</button>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="login.html">登录</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="register.html">注册</a>
                </li>
            `;
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const realName = document.getElementById('realName').value;
            const studentNo = document.getElementById('studentNo').value;
            const role = parseInt(document.getElementById('role').value);

            request('/auth/register', {
                method: 'POST',
                body: JSON.stringify({ username, password, realName, studentNo, role })
            })
            .then(result => {
                if (result.code === 200) {
                    alert('注册成功！请登录');
                    window.location.href = 'login.html';
                } else {
                    alert(result.message || '注册失败');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('注册失败，请稍后重试');
            });
        });

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
