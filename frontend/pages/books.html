<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理 - 图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="../index.html">图书管理系统</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navLinks">
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>图书管理</h2>
            <button class="btn btn-primary" id="addBookBtn" data-bs-toggle="modal" data-bs-target="#bookModal">
                + 添加图书
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>书名</th>
                                <th>作者</th>
                                <th>ISBN</th>
                                <th>总库存</th>
                                <th>可借库存</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="bookTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="bookModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="bookModalTitle">添加图书</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bookForm">
                        <input type="hidden" id="bookId">
                        <div class="mb-3">
                            <label for="title" class="form-label">书名</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="author" class="form-label">作者</label>
                            <input type="text" class="form-control" id="author">
                        </div>
                        <div class="mb-3">
                            <label for="isbn" class="form-label">ISBN</label>
                            <input type="text" class="form-control" id="isbn">
                        </div>
                        <div class="mb-3">
                            <label for="totalStock" class="form-label">总库存</label>
                            <input type="number" class="form-control" id="totalStock" value="0" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label for="availableStock" class="form-label">可借库存</label>
                            <input type="number" class="form-control" id="availableStock" value="0" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label">状态</label>
                            <select class="form-select" id="status">
                                <option value="0">可借阅</option>
                                <option value="1">已下架</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveBookBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const userInfo = getUserInfo();
        const isAdmin = userInfo && userInfo.role === 1;

        function initPage() {
            updateNavLinks();
            checkPermission();
            loadBooks();
            setupEventListeners();
        }

        function updateNavLinks() {
            const navLinks = document.getElementById('navLinks');
            if (userInfo) {
                const isAdmin = userInfo.role === 1;
                navLinks.innerHTML = `
                    <li class="nav-item">
                        <span class="nav-link text-white">欢迎, ${userInfo.realName}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my-borrows.html">我的借阅</a>
                    </li>
                    ${isAdmin ? `
                        <li class="nav-item">
                            <a class="nav-link" href="statistics.html">数据统计</a>
                        </li>
                    ` : ''}
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="handleLogout(event)">退出登录</a>
                    </li>
                `;
            } else {
                navLinks.innerHTML = `
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">登录</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">注册</a>
                    </li>
                `;
            }
        }

        function checkPermission() {
            if (!userInfo) {
                alert('请先登录');
                window.location.href = 'login.html';
                return;
            }
            if (!isAdmin) {
                document.getElementById('addBookBtn').style.display = 'none';
            }
        }

        function handleLogout(event) {
            event.preventDefault();
            logout();
            alert('已退出登录');
            window.location.href = '../index.html';
        }

        function loadBooks() {
            request('/books', { method: 'GET' })
                .then(result => {
                    if (result.code === 200) {
                        renderBooks(result.data);
                    } else {
                        alert(result.message || '加载图书失败');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('加载图书失败，请稍后重试');
                });
        }

        function renderBooks(books) {
            const tbody = document.getElementById('bookTableBody');
            tbody.innerHTML = books.map(book => `
                <tr>
                    <td>${book.id}</td>
                    <td>${escapeHtml(book.title)}</td>
                    <td>${escapeHtml(book.author || '-')}</td>
                    <td>${escapeHtml(book.isbn || '-')}</td>
                    <td>${book.totalStock}</td>
                    <td>${book.availableStock}</td>
                    <td>${getBookStatusText(book.status)}</td>
                    <td>
                        ${isAdmin ? `
                            <button class="btn btn-sm btn-primary" onclick="editBook(${book.id})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteBook(${book.id})">删除</button>
                        ` : ''}
                        ${userInfo && book.status === 0 && book.availableStock > 0 ? `
                            <button class="btn btn-sm btn-success" onclick="borrowBook(${book.id})">借阅</button>
                        ` : ''}
                        ${!isAdmin && (!userInfo || book.status !== 0 || book.availableStock <= 0) ? '-' : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function borrowBook(bookId) {
            if (!confirm('确定要借阅这本书吗？')) {
                return;
            }
            try {
                const response = await request(`/borrow/borrow/${bookId}`, {
                    method: 'POST'
                });
                if (response.code === 200) {
                    alert('借阅成功！');
                    loadBooks();
                } else {
                    alert(response.message);
                }
            } catch (error) {
                console.error('借阅失败:', error);
                alert('借阅失败');
            }
        }

        function getBookStatusText(status) {
            if (status === 0) {
                return '<span class="badge bg-success">可借阅</span>';
            } else if (status === 1) {
                return '<span class="badge bg-secondary">已下架</span>';
            }
            return '<span class="badge bg-light text-dark">未知</span>';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setupEventListeners() {
            document.getElementById('addBookBtn').addEventListener('click', function() {
                document.getElementById('bookModalTitle').textContent = '添加图书';
                document.getElementById('bookId').value = '';
                document.getElementById('bookForm').reset();
            });

            document.getElementById('saveBookBtn').addEventListener('click', saveBook);
        }

        function editBook(id) {
            request(`/books/${id}`, { method: 'GET' })
                .then(result => {
                    if (result.code === 200) {
                        const book = result.data;
                        document.getElementById('bookModalTitle').textContent = '编辑图书';
                        document.getElementById('bookId').value = book.id;
                        document.getElementById('title').value = book.title;
                        document.getElementById('author').value = book.author || '';
                        document.getElementById('isbn').value = book.isbn || '';
                        document.getElementById('totalStock').value = book.totalStock;
                        document.getElementById('availableStock').value = book.availableStock;
                        document.getElementById('status').value = book.status;

                        const modal = new bootstrap.Modal(document.getElementById('bookModal'));
                        modal.show();
                    } else {
                        alert(result.message || '获取图书信息失败');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('获取图书信息失败，请稍后重试');
                });
        }

        function saveBook() {
            const id = document.getElementById('bookId').value;
            const bookData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                isbn: document.getElementById('isbn').value,
                totalStock: parseInt(document.getElementById('totalStock').value),
                availableStock: parseInt(document.getElementById('availableStock').value),
                status: parseInt(document.getElementById('status').value)
            };

            const url = id ? `/books/${id}` : '/books';
            const method = id ? 'PUT' : 'POST';

            request(url, {
                method: method,
                body: JSON.stringify(bookData)
            })
                .then(result => {
                    if (result.code === 200) {
                        alert(id ? '更新成功' : '添加成功');
                        const modal = bootstrap.Modal.getInstance(document.getElementById('bookModal'));
                        modal.hide();
                        loadBooks();
                    } else {
                        alert(result.message || '操作失败');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('操作失败，请稍后重试');
                });
        }

        function deleteBook(id) {
            if (!confirm('确定要删除这本图书吗？')) {
                return;
            }

            request(`/books/${id}`, { method: 'DELETE' })
                .then(result => {
                    if (result.code === 200) {
                        alert('删除成功');
                        loadBooks();
                    } else {
                        alert(result.message || '删除失败');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('删除失败，请稍后重试');
                });
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
