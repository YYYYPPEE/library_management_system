<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .stat-card {
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="bi bi-book"></i> 图书管理系统
            </a>
            <div class="navbar-nav ms-auto" id="navLinks">
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2><i class="bi bi-bar-chart"></i> 数据统计</h2>
        </div>

        <div class="row g-4">
            <!-- 用户统计 -->
            <div class="col-md-3">
                <div class="stat-card card h-100 border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="bi bi-people display-3 text-primary mb-3"></i>
                        <h5 class="card-title">总用户数</h5>
                        <h2 class="text-primary" id="totalUsers">0</h2>
                    </div>
                </div>
            </div>

            <!-- 图书统计 -->
            <div class="col-md-3">
                <div class="stat-card card h-100 border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="bi bi-book display-3 text-success mb-3"></i>
                        <h5 class="card-title">总图书数</h5>
                        <h2 class="text-success" id="totalBooks">0</h2>
                    </div>
                </div>
            </div>

            <!-- 可借图书 -->
            <div class="col-md-3">
                <div class="stat-card card h-100 border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="bi bi-check-circle display-3 text-info mb-3"></i>
                        <h5 class="card-title">可借图书</h5>
                        <h2 class="text-info" id="availableBooks">0</h2>
                    </div>
                </div>
            </div>

            <!-- 借阅统计 -->
            <div class="col-md-3">
                <div class="stat-card card h-100 border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="bi bi-journal display-3 text-warning mb-3"></i>
                        <h5 class="card-title">总借阅数</h5>
                        <h2 class="text-warning" id="totalBorrows">0</h2>
                    </div>
                </div>
            </div>

            <!-- 借阅中 -->
            <div class="col-md-4">
                <div class="stat-card card h-100 border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="bi bi-clock-history display-3 text-warning mb-3"></i>
                        <h5 class="card-title">借阅中</h5>
                        <h2 class="text-warning" id="borrowedBooks">0</h2>
                    </div>
                </div>
            </div>

            <!-- 已归还 -->
            <div class="col-md-4">
                <div class="stat-card card h-100 border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="bi bi-check-circle-fill display-3 text-success mb-3"></i>
                        <h5 class="card-title">已归还</h5>
                        <h2 class="text-success" id="returnedBooks">0</h2>
                    </div>
                </div>
            </div>

            <!-- 逾期 -->
            <div class="col-md-4">
                <div class="stat-card card h-100 border-0 shadow-sm">
                    <div class="card-body text-center">
                        <i class="bi bi-exclamation-triangle display-3 text-danger mb-3"></i>
                        <h5 class="card-title">已逾期</h5>
                        <h2 class="text-danger" id="overdueBooks">0</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // 检查登录状态
        checkAuth();
        // 渲染导航
        renderNav();

        // 加载统计数据
        async function loadStatistics() {
            try {
                console.log('开始加载统计数据...');
                console.log('Token:', getToken() ? '存在' : '不存在');
                console.log('UserInfo:', getUserInfo());
                
                const response = await request('/statistics');
                console.log('API响应:', response);
                
                if (response.code === 200) {
                    const stats = response.data;
                    document.getElementById('totalUsers').textContent = stats.totalUsers || 0;
                    document.getElementById('totalBooks').textContent = stats.totalBooks || 0;
                    document.getElementById('availableBooks').textContent = stats.availableBooks || 0;
                    document.getElementById('totalBorrows').textContent = stats.totalBorrows || 0;
                    document.getElementById('borrowedBooks').textContent = stats.borrowedBooks || 0;
                    document.getElementById('returnedBooks').textContent = stats.returnedBooks || 0;
                    document.getElementById('overdueBooks').textContent = stats.overdueBooks || 0;
                } else {
                    alert('加载失败: ' + (response.message || '未知错误'));
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
                alert('加载统计数据失败: ' + (error.message || '未知错误'));
            }
        }

        // 页面加载时调用
        loadStatistics();
    </script>
</body>
</html>
