<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园图书借阅管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">图书管理系统</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navLinks">
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="mb-4">欢迎使用校园图书借阅管理系统</h1>
                <p class="lead mb-4" id="welcomeMessage">高效管理图书借阅，让知识触手可及</p>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center" id="actionButtons">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        function initPage() {
            const userInfo = getUserInfo();
            const navLinks = document.getElementById('navLinks');
            const welcomeMessage = document.getElementById('welcomeMessage');
            const actionButtons = document.getElementById('actionButtons');

            if (userInfo) {
                navLinks.innerHTML = `
                    <li class="nav-item">
                        <span class="nav-link text-white">欢迎, ${userInfo.realName}</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="handleLogout()">退出登录</a>
                    </li>
                `;
                welcomeMessage.textContent = `你好, ${userInfo.realName}! ${userInfo.role === 1 ? '管理员' : '同学'}`;
                actionButtons.innerHTML = `
                    <button class="btn btn-primary btn-lg" onclick="alert('功能开发中...')">
                        ${userInfo.role === 1 ? '图书管理' : '借阅图书'}
                    </button>
                `;
            } else {
                navLinks.innerHTML = `
                    <li class="nav-item">
                        <a class="nav-link" href="pages/login.html">登录</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pages/register.html">注册</a>
                    </li>
                `;
                actionButtons.innerHTML = `
                    <a href="pages/login.html" class="btn btn-primary btn-lg">登录系统</a>
                    <a href="pages/register.html" class="btn btn-outline-primary btn-lg">注册账号</a>
                `;
            }
        }

        function handleLogout() {
            logout();
            alert('已退出登录');
            window.location.reload();
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
